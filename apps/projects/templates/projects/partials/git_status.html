{% if git.is_repo %}
<div class="flex items-center gap-1.5 text-xs">
    <span class="font-mono text-slate-300">{{ git.branch }}</span>
    {% if git.is_dirty %}
        <span class="rounded bg-amber-500/20 px-1.5 py-0.5 font-medium text-amber-300" title="Cambios sin confirmar">dirty</span>
    {% else %}
        <span class="rounded bg-emerald-500/20 px-1.5 py-0.5 font-medium text-emerald-300" title="Sin cambios">clean</span>
    {% endif %}
    {% if git.ahead %}
        <span class="text-sky-400" title="Commits por subir">↑{{ git.ahead }}</span>
    {% endif %}
    {% if git.behind %}
        <span class="text-rose-400" title="Commits por bajar">↓{{ git.behind }}</span>
    {% endif %}
</div>
{% else %}
<span class="text-xs text-slate-600">sin git</span>
{% endif %}
