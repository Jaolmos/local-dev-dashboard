<article class="flex flex-col rounded-lg border border-slate-800 bg-slate-900 p-5 transition hover:border-slate-700">
    <div class="flex items-start justify-between gap-2">
        <h2 class="font-semibold text-slate-100">{{ project.name }}</h2>
        <div
            hx-get="{% url 'projects:git-status' project.pk %}"
            hx-trigger="revealed"
            hx-swap="innerHTML"
            class="text-xs text-slate-500"
        >
            <span class="inline-block h-2 w-2 animate-pulse rounded-full bg-slate-600"></span>
        </div>
    </div>

    <p class="mt-2 line-clamp-2 text-sm text-slate-400">
        {{ project.description|default:"Sin descripción" }}
    </p>

    {% if project.stack_tags %}
    <div class="mt-3 flex flex-wrap gap-1.5">
        {% for tag in project.stack_tags %}
        <span class="rounded-full bg-slate-800 px-2 py-0.5 text-xs font-medium text-emerald-300">{{ tag }}</span>
        {% endfor %}
    </div>
    {% endif %}

    <div class="mt-auto flex gap-2 pt-4">
        <button
            hx-post="{% url 'projects:open-vscode' project.pk %}"
            hx-swap="outerHTML"
            class="flex-1 rounded-md bg-emerald-600 px-3 py-1.5 text-sm font-medium text-white transition hover:bg-emerald-500"
        >
            Abrir en VSCode
        </button>
        <button
            hx-get="{% url 'projects:readme' project.pk %}"
            hx-target="#modal-root"
            hx-swap="innerHTML"
            class="rounded-md border border-slate-700 px-3 py-1.5 text-sm font-medium text-slate-300 transition hover:bg-slate-800"
        >
            Docs
        </button>
    </div>
</article>
