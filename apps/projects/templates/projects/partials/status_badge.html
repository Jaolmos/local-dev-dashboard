{# Badge de estado git. Params: tone ("brand"|"amber"), label, tooltip (opcional). #}
<span
    class="inline-flex shrink-0 items-center gap-1 rounded-full px-2 py-0.5 font-medium ring-1 ring-inset {% if tone == 'amber' %}bg-amber-500/10 text-amber-300 ring-amber-500/20{% else %}bg-brand-500/10 text-brand-400 ring-brand-500/20{% endif %}"
    {% if tooltip %}title="{{ tooltip }}"{% endif %}
>
    <span class="h-1.5 w-1.5 rounded-full {% if tone == 'amber' %}bg-amber-400{% else %}bg-brand-400{% endif %}"></span>{{ label }}
</span>
